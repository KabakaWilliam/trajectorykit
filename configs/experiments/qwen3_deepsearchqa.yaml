# Experiment: Qwen3-8B on DeepSearchQA
# Usage: python evals/eval.py --config configs/experiments/qwen3_deepsearchqa.yaml

model:
  name: "Qwen/Qwen3-8B"
  api_url: "http://localhost:3030/v1"

vllm:
  port: 3030
  gpu_devices: [2]
  gpu_memory_utilization: 0.6
  tool_call_parser: "hermes"
  reasoning_parser: "deepseek_r1"
  extra_args: []
  env:
    TIKTOKEN_CACHE_DIR: "/VData/resources/huggingface/tiktoken-cache"

agent:
  max_recursion_depth: 1
  sub_agent_turn_budget: 10
  token_safety_margin: 256

sandbox:
  url: "http://localhost:8080/run_code"
  port: 8080
  sif_image: "sandbox-fusion_server-20250609.sif"
  docker_uri: "docker://volcengine/sandbox-fusion:server-20250609"
  sif_dir: "."

traces:
  dir: "traces/"

prompts:
  orchestrator: "configs/prompts/orchestrator.txt"
  worker: "configs/prompts/worker.txt"
  synthesizer: "configs/prompts/synthesizer.txt"
  spotcheck_extract: "configs/prompts/spotcheck_extract.txt"
  spotcheck_compare: "configs/prompts/spotcheck_compare.txt"

model_profiles:
  "Qwen/Qwen3-8B":
    context_window: 32768
    max_completion_tokens: 8192
    supports_reasoning_effort: false
    default_temperature: 0.7
    chat_template_kwargs:
      enable_thinking: true

  "openai/gpt-oss-20b":
    context_window: 131072
    supports_reasoning_effort: true
    default_reasoning_effort: "high"
    default_temperature: 1.0

default_profile:
  context_window: 32768
  supports_reasoning_effort: false
  default_temperature: 0.7

dataset:
  name: "google/deepsearchqa"
  split: "eval"
  sample_n: 2
  seed: 42

eval:
  turn_length: 25
  reasoning_effort: null
  verbose: true
  output_dir: null
  workers: 5

judge:
  enabled: true
  model: "gpt-4.1-mini"
  threads: 5
