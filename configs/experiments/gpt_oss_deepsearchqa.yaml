# Experiment: GPT-OSS-20B on DeepSearchQA
# Usage: python evals/eval.py --config configs/experiments/gpt_oss_deepsearchqa.yaml

model:
  name: "openai/gpt-oss-20b"
  api_url: "http://localhost:3030/v1"

vllm:
  port: 3030
  gpu_devices: [2]
  gpu_memory_utilization: 0.9
  tool_call_parser: "openai"
  reasoning_parser: null
  extra_args: ["--async-scheduling"]
  env:
    TIKTOKEN_CACHE_DIR: "/VData/resources/huggingface/tiktoken-cache"

agent:
  max_recursion_depth: 1
  sub_agent_turn_budget: 15
  token_safety_margin: 256
  # Symbolic references: compress large tool outputs to summaries at depth 0.
  # Full data stays in MemoryStore; the LLM sees a compact reference.
  symbolic_references: false
  symbolic_threshold: 500         # chars — smaller outputs pass through
  # Research plan: inject a structured progress tracker every N turns.
  plan_state: true
  plan_inject_interval: 3         # inject plan every N turns
  draft_report: true              # update_draft tool at root for answer safety net
  verify_before_publish: true      # LLM audits draft before publishing
  spot_check_enabled: true          # Stage 2: search-verify key claims
  spot_check_claims: 5
  max_verification_rejections: 4    # Stage 1: verifier can reject up to N times before force-publish
  max_spot_check_rejections: 4      # Stage 2: spot-check can reject up to N times before force-publish
  chain_analysis_enabled: true       # Pre-dispatch causal chain decomposition
    # History compaction: replace old root messages with a compact summary once
  # the draft absorbs their findings, reclaiming context window.
  history_compaction_enabled: true
  history_compaction_msg_threshold: 30  # min messages before first compaction
  history_compaction_min_interval: 4   # min turns between compactions
  history_compaction_recent_turns: 3   # keep last N turn-groups in full


sandbox:
  url: "http://localhost:8080/run_code"
  port: 8080
  sif_image: "sandbox-fusion_server-20250609.sif"
  docker_uri: "docker://volcengine/sandbox-fusion:server-20250609"
  sif_dir: "."

traces:
  dir: "traces/"

prompts:
  orchestrator: "configs/prompts/orchestrator.txt"
  worker: "configs/prompts/worker.txt"
  verifier: "configs/prompts/verifier.txt"
  spotcheck_extract: "configs/prompts/spotcheck_extract.txt"
  spotcheck_compare: "configs/prompts/spotcheck_compare.txt"
  spotcheck_refusal: "configs/prompts/spotcheck_refusal.txt"
  chain_analysis: "configs/prompts/chain_analysis.txt"

model_profiles:
  "Qwen/Qwen3-8B":
    context_window: 32768
    supports_reasoning_effort: false
    default_temperature: 0.7

  "openai/gpt-oss-20b":
    context_window: 131072
    supports_reasoning_effort: true
    default_reasoning_effort: "high"
    default_temperature: 1.0

default_profile:
  context_window: 32768
  supports_reasoning_effort: false
  default_temperature: 0.7

dataset:
  name: "google/deepsearchqa"
  split: "eval"
  sample_n: 100
  seed: 42

eval:
  turn_length: null #root limit
  reasoning_effort: "high"
  verbose: true
  output_dir: null
  workers: 8

judge:
  enabled: true
  model: "gpt-4.1-mini" #gemini-2.5-flash #gpt-4.1-mini
  threads: 5
  # rpm: 5   # uncomment to throttle (free tier = 5 RPM). Omit or null for unlimited (paid tier).

ntfy:
  enabled: true
  url: "https://ntfy.sh"
  topic: "trajectorykit-eval"
  interval_pct: 10                # push notification every N% (0 = start/finish only)

# For Deep Research Bench, use configs/experiments/gpt_oss_deep_research_bench.yaml


